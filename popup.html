<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SR Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #151820;
      --border: #22272f;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --accent-glow: rgba(0,229,160,0.35);
      --salary-accent: #6ea8ff;
      --salary-dim: rgba(110,168,255,0.14);
      --warn: #ff6b4a;
      --warn-dim: rgba(255,107,74,0.12);
      --text: #e8eaf0;
      --muted: #5a6070;
      --mono: 'Courier New', 'Consolas', monospace;
      --display: -apple-system, 'Segoe UI', sans-serif;
    }

    body {
      width: 372px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      min-height: 200px;
    }

    .header {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .logo-img {
      height: 36px;
      width: auto;
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      margin: 0 12px;
      padding-top: 10px;
      gap: 6px;
    }
    .tab {
      flex: 1;
      padding: 9px 8px;
      border: 1px solid var(--border);
      border-radius: 8px 8px 0 0;
      background: var(--surface);
      color: var(--muted);
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border-bottom: none;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--text); border-color: #333; }
    .tab.active {
      color: var(--salary-accent);
      background: var(--bg);
      border-color: #3d5a8a;
      box-shadow: 0 -2px 12px var(--salary-dim);
    }

    .panel {
      display: none;
      border: 1px solid var(--border);
      border-radius: 0 10px 10px 10px;
      margin: 0 12px 12px;
      padding-bottom: 10px;
      min-height: 120px;
    }
    .panel.visible { display: block; }
    #panel-offer.panel.visible {
      border-color: #3d5a8a;
      border-top-left-radius: 0;
    }
    #panel-salary.panel.visible {
      border-color: #3d5a8a;
      border-top-right-radius: 10px;
      border-top-left-radius: 0;
    }
    #panel-keyword.panel.visible {
      border-color: #3d5a8a;
      border-top-right-radius: 10px;
      border-top-left-radius: 0;
    }

    #panel-keyword .field-row label { color: #d0d8e8; }
    #panel-keyword .field-row textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      resize: vertical;
      min-height: 56px;
    }
    #panel-keyword .field-row textarea::placeholder { color: #6a7585; }
    #panel-keyword .field-row textarea:focus {
      outline: none;
      border-color: var(--salary-accent);
    }
    #panel-keyword .field-row input::placeholder { color: #6a7585; }
    #panel-keyword .field-hint { color: #d0d8e8; }
    #panel-keyword .salary-check { color: #d0d8e8; }

    /* ── Offer panel (existing) ── */
    .drop-zone {
      margin: 14px 14px 0;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 18px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      background: var(--surface);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--salary-accent);
      background: var(--salary-dim);
    }
    .drop-zone.drag-over { transform: scale(1.01); }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 22px; margin-bottom: 6px; display: block; }
    .drop-zone .drop-label {
      font-family: var(--display);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      display: block;
    }
    .drop-zone .drop-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      display: block;
    }

    .file-loaded {
      margin: 14px 14px 0;
      background: var(--salary-dim);
      border: 1.5px solid var(--salary-accent);
      border-radius: 10px;
      padding: 10px 12px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .file-loaded.visible { display: flex; }
    .file-loaded .file-icon { font-size: 18px; flex-shrink: 0; }
    .file-loaded .file-info { flex: 1; min-width: 0; }
    .file-loaded .file-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--salary-accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-loaded .field-count { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .file-clear {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 16px; padding: 2px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .file-clear:hover { color: var(--warn); }

    .preview {
      margin: 10px 14px 0;
      display: none;
      max-height: 140px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .preview.visible { display: block; }
    .preview-table { width: 100%; border-collapse: collapse; }
    .preview-table tr { border-bottom: 1px solid var(--border); }
    .preview-table tr:last-child { border-bottom: none; }
    .preview-table td { padding: 5px 10px; font-size: 10px; }
    .preview-table td:first-child {
      color: var(--muted);
      width: 55%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 0;
    }
    .preview-table td:last-child {
      color: var(--salary-accent);
      font-weight: 500;
      text-align: right;
    }
    .preview-table td.empty { color: var(--border); font-style: italic; }

    .run-btn {
      margin: 12px 14px;
      width: calc(100% - 28px);
      padding: 11px;
      background: var(--salary-accent);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      font-family: var(--display);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.2s;
      display: none;
    }
    .run-btn.visible { display: block; }
    .run-btn:hover {
      filter: brightness(1.08);
      box-shadow: 0 0 16px var(--salary-dim);
      transform: translateY(-1px);
    }
    .run-btn:disabled {
      background: var(--muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .currency-note {
      margin: 8px 14px 0;
      padding: 8px 12px;
      background: var(--warn-dim);
      border: 1px solid var(--warn);
      border-radius: 6px;
      font-size: 10px;
      color: var(--warn);
      display: none;
    }
    .currency-note.visible { display: block; }

    /* ── Salary panel ── */
    .salary-fields {
      padding: 14px 14px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .field-row label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
      font-family: var(--display);
      font-weight: 600;
    }
    #panel-salary .field-row label {
      color: #d0d8e8;
    }
    .field-row input[type="text"],
    .field-row input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
    }
    #panel-salary .field-row input::placeholder {
      color: #6a7585;
    }
    .field-row input:focus {
      outline: none;
      border-color: var(--salary-accent);
    }
    .field-hint { font-size: 9px; color: #b0b8c8; margin-top: 3px; line-height: 1.35; }
    #panel-salary .field-hint { color: #d0d8e8; }
    #panel-salary .salary-check { color: #d0d8e8; }
    .salary-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--display);
      font-size: 11px;
      color: var(--text);
    }
    .salary-check input { width: 14px; height: 14px; accent-color: var(--salary-accent); }

    .salary-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 12px 14px 0;
    }
    .btn-salary {
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-family: var(--display);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-salary.primary {
      background: var(--salary-accent);
      color: #0d1117;
    }
    .btn-salary.primary:hover {
      filter: brightness(1.08);
      box-shadow: 0 0 16px var(--salary-dim);
    }
    .btn-salary.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-salary.secondary:hover { border-color: var(--salary-accent); color: var(--salary-accent); }
    .btn-salary.danger {
      background: transparent;
      color: var(--warn);
      border: 1px solid var(--warn);
    }
    .btn-salary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── Shared / status ── */
    .status {
      margin: 10px 14px 0;
      display: none;
    }
    .status.visible { display: block; }
    .status-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.running {
      background: var(--salary-accent);
      animation: pulse 1s infinite;
    }
    .status-dot.done { background: var(--salary-accent); }
    .status-dot.error { background: var(--warn); }
    .status-dot.salary-running {
      background: var(--salary-accent);
      animation: pulse 1s infinite;
    }
    .status-dot.salary-done { background: var(--salary-accent); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .status-label {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--display);
      font-weight: 600;
    }

    .log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      max-height: 100px;
      overflow-y: auto;
      font-size: 10px;
      line-height: 1.65;
    }
    #salaryLog { max-height: 130px; }

    .log-line { display: flex; gap: 6px; }
    .log-line .tick { color: var(--salary-accent); flex-shrink: 0; }
    .log-line .cross { color: var(--warn); flex-shrink: 0; }
    .log-line .wait { color: var(--muted); flex-shrink: 0; }
    .log-line .msg { color: var(--muted); }

    .summary {
      margin: 8px 14px 0;
      display: none;
      gap: 8px;
    }
    .summary.visible { display: flex; }
    .summary-pill {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      text-align: center;
    }
    .summary-pill.good { border-color: var(--salary-accent); background: var(--salary-dim); }
    .summary-pill.bad  { border-color: var(--warn);  background: var(--warn-dim); }
    .summary-pill .pill-num {
      font-family: var(--display);
      font-size: 18px;
      font-weight: 800;
      display: block;
      line-height: 1;
    }
    .summary-pill.good .pill-num { color: var(--salary-accent); }
    .summary-pill.bad  .pill-num { color: var(--warn); }
    .summary-pill .pill-label {
      font-size: 9px;
      color: var(--muted);
      margin-top: 2px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .usage-count {
      margin: 10px 14px 12px;
      font-size: 10px;
      color: #d0d8e8;
    }
    .usage-count .usage-num { color: var(--salary-accent); font-weight: 600; }
  </style>
</head>
<body>

  <div class="header">
    <svg class="logo-img" viewBox="0 0 90 50" xmlns="http://www.w3.org/2000/svg">
      <text x="12" y="37" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="2">NIQ</text>
    </svg>
  </div>

  <div class="tab-bar">
    <button type="button" class="tab active" id="tabOffer" data-panel="panel-offer">Mr Offer</button>
    <button type="button" class="tab salary" id="tabSalary" data-panel="panel-salary">Cost assist</button>
    <button type="button" class="tab keyword" id="tabKeyword" data-panel="panel-keyword">Keyword</button>
  </div>

  <!-- ── Mr Offer ── -->
  <div class="panel visible" id="panel-offer">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls" />
      <span class="drop-icon">📂</span>
      <span class="drop-label">Drop Excel file here</span>
      <span class="drop-sub">or click to browse · .xlsx / .xls</span>
    </div>

    <div class="file-loaded" id="fileLoaded">
      <span class="file-icon">📊</span>
      <div class="file-info">
        <div class="file-name" id="fileName">—</div>
        <div class="field-count" id="fieldCount">—</div>
      </div>
      <button class="file-clear" id="fileClear" title="Remove file">✕</button>
    </div>

    <div class="preview" id="preview">
      <table class="preview-table" id="previewTable"></table>
    </div>

    <div class="currency-note" id="currencyNote">
      Currency change must be done manually (USD → INR)
    </div>

    <button class="run-btn" id="runBtn">▶ Fill Form Now</button>

    <div class="status" id="statusBox">
      <div class="status-header">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-label" id="statusLabel">Idle</span>
      </div>
      <div class="log" id="log"></div>
    </div>

    <div class="summary" id="summary">
      <div class="summary-pill good">
        <span class="pill-num" id="sumFilled">0</span>
        <span class="pill-label">Filled</span>
      </div>
      <div class="summary-pill" id="sumCurrencyPill">
        <span class="pill-num" id="sumCurrency">0</span>
        <span class="pill-label">Currencies → INR</span>
      </div>
      <div class="summary-pill bad" id="sumErrorPill" style="display:none">
        <span class="pill-num" id="sumErrors">0</span>
        <span class="pill-label">Errors</span>
      </div>
    </div>

    <div class="usage-count" id="usageCount">
      Runs: <span class="usage-num" id="usageNum">0</span>
    </div>
  </div>

  <!-- ── Cost assist ── -->
  <div class="panel" id="panel-salary">
    <div class="salary-fields">
      <div class="field-row">
        <label for="salaryMax">Max budget (same units as screening answers)</label>
        <input type="text" id="salaryMax" placeholder="e.g. 3500000, 35,00,000, or 35L" inputmode="decimal" />
      </div>
      <div class="field-row">
        <label for="salaryMin">Min (optional)</label>
        <input type="text" id="salaryMin" placeholder="0 or 10L" inputmode="decimal" />
      </div>
      <div class="field-row">
        <label for="salaryWait">Wait after Screening (ms)</label>
        <input type="number" id="salaryWait" placeholder="600" min="200" step="100" />
      </div>
      <label class="salary-check">
        <input type="checkbox" id="salaryDryRun" />
        Dry run (read screening answer only, never click Move)
      </label>
    </div>

    <div class="salary-actions">
      <button type="button" class="btn-salary primary" id="btnSalaryQueue">Go</button>
      <button type="button" class="btn-salary danger" id="btnSalaryStop">Stop</button>
    </div>

    <div class="status" id="salaryStatusBox">
      <div class="status-header">
        <div class="status-dot" id="salaryStatusDot"></div>
        <span class="status-label" id="salaryStatusLabel">Idle</span>
      </div>
      <div class="log" id="salaryLog"></div>
    </div>
  </div>

  <!-- ── Keyword Search ── -->
  <div class="panel" id="panel-keyword">
    <div class="salary-fields">
      <div class="field-row">
        <label for="kwInput">Keywords (comma-separated)</label>
        <textarea id="kwInput" rows="3" placeholder="e.g. Python, AWS, Machine Learning, Chennai"></textarea>
        <div class="field-hint">Abbreviations like ML, AI, NLP auto-expand to full forms</div>
      </div>
      <div class="field-row">
        <label for="kwMinHits">Min keywords to match</label>
        <input type="number" id="kwMinHits" placeholder="2" min="1" step="1" />
        <div class="field-hint">Move forward only if at least this many keywords are found</div>
      </div>
      <label class="salary-check">
        <input type="checkbox" id="kwDryRun" />
        Dry run (scan keywords only, never click Move)
      </label>
    </div>

    <div class="salary-actions">
      <button type="button" class="btn-salary primary" id="btnKwGo">Go</button>
      <button type="button" class="btn-salary danger" id="btnKwStop">Stop</button>
    </div>

    <div class="status" id="kwStatusBox">
      <div class="status-header">
        <div class="status-dot" id="kwStatusDot"></div>
        <span class="status-label" id="kwStatusLabel">Idle</span>
      </div>
      <div class="log" id="kwLog" style="max-height:130px"></div>
    </div>
  </div>

  <script src="xlsx-mini.js"></script>
  <script src="popup.js"></script>
</body>
</html>
